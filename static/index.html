<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 宠物外观版本测试跟踪器</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#6B7280;--accent:#3B82F6;--accent2:#3B82F6;--pass:#34D399;--fail:#F87171;--pending:#A78BFA;--skip:#6B7280;--na:#6B7280;--gold:#F59E0B;--hover-row:rgba(255,255,255,.04);--hover-col:rgba(59,130,246,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0f172a,#1e293b,#1e3a5f);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.header-right{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 14px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--card)}
.btn-purple{background:var(--accent);color:#fff}.btn-purple:hover{background:#2563eb}
.btn-sm{padding:5px 10px;font-size:11px}

.vtabs{display:flex;gap:6px;padding:10px 24px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:wrap}
.vtab{padding:5px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;transition:all .2s;position:relative}
.vtab:hover{border-color:var(--accent);color:var(--text)}.vtab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.vtab .vtab-edit{display:none;margin-left:4px;font-size:10px;cursor:pointer;opacity:.6}.vtab:hover .vtab-edit{display:inline}
.vtab-add{width:26px;height:26px;border-radius:50%;border:2px dashed var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.vtab-add:hover{border-color:var(--accent);color:var(--accent)}

.stats-bar{display:flex;gap:16px;padding:10px 24px;font-size:12px;color:var(--muted);align-items:center;flex-wrap:wrap}
.stats-bar .sv{font-weight:700;margin-right:2px}
.stats-bar .sp{color:var(--pass)}.stats-bar .sf{color:var(--fail)}.stats-bar .sw{color:var(--pending)}.stats-bar .sa{color:var(--accent2)}
.prog-mini{width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:flex}
.prog-mini .pp{background:var(--pass);transition:width .4s}.prog-mini .pf{background:var(--fail);transition:width .4s}.prog-mini .pw{background:var(--pending);transition:width .4s}


.stat-cards{display:flex;gap:8px;align-items:stretch}
.stat-card{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border)}
.stat-icon{font-size:14px}
.stat-num{font-size:20px;font-weight:800;color:var(--text);line-height:1}
.stat-label{font-size:10px;color:var(--muted);font-weight:500}
.sc-pass .stat-num{color:var(--pass)}
.sc-fail .stat-num{color:var(--fail)}
.sc-pend .stat-num{color:var(--pending)}
.stat-progress-wrap{display:flex;flex-direction:column;gap:3px;min-width:180px}
.stat-pct{font-size:18px;font-weight:800;color:var(--text)}
.stat-progress{height:8px;border-radius:4px;background:var(--border);overflow:hidden;display:flex}
.sp-pass{background:linear-gradient(90deg,#34D399,#6EE7B7);transition:width .4s}
.sp-fail{background:linear-gradient(90deg,#F87171,#FCA5A5);transition:width .4s}
.sp-pend{background:rgba(148,163,184,.4);transition:width .4s}
.stat-legend{display:flex;gap:10px}
.sl-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted)}
.sl-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.data-status{padding:4px 24px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.data-dot{width:7px;height:7px;border-radius:50%;background:var(--pass);display:inline-block}.data-dot.empty{background:var(--fail)}

.table-wrap{padding:0 24px 40px;overflow:auto;position:relative;z-index:1}
table.mt{border-collapse:separate;border-spacing:0;min-width:100%}

table.mt thead th{background:var(--card);position:sticky;top:0;z-index:40}
table.mt thead th.col-hl{background:var(--card)!important}
/* 列 hover 高亮 */
table.mt td.col-hl{background:var(--hover-col)!important}
table.mt td.col-hl .cell{background:transparent!important}
.filter-chips{display:flex;gap:4px;margin-left:12px}
.filter-chip{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.filter-chip:hover{border-color:var(--accent);color:var(--text)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
table.mt th,table.mt td{border:1px solid var(--border);padding:0;vertical-align:middle;text-align:center}

.cat-row td{background:linear-gradient(90deg,rgba(99,102,241,.12),transparent)!important;padding:10px 12px!important;font-size:12px;font-weight:800;letter-spacing:.5px;border:none!important;border-bottom:2px solid var(--border)!important;border-top:16px solid var(--bg)!important}
.cat-row .cat-label{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:4px;font-size:11px}
.rh{position:sticky;left:0;z-index:10;background:var(--card);text-align:left!important;padding:6px 10px!important;font-size:12px;font-weight:600;min-width:220px;max-width:280px;white-space:normal;line-height:1.4}
.rh.gh{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.03));color:var(--accent2);font-weight:600;font-size:13px;cursor:default;padding:8px 10px!important}

.ch{min-width:115px;max-width:135px;padding:6px 4px!important;background:var(--card);position:sticky;top:0;z-index:40}
.corner{position:sticky;left:0;top:0;z-index:50;background:var(--card);min-width:220px;padding:8px!important}

.pcol{display:flex;flex-direction:column;align-items:center;gap:4px}
.pav-old-replaced{width:80px;height:80px;border-radius:10px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;cursor:pointer;position:relative;border:2px solid transparent;transition:border-color .2s}
.pav:hover{border-color:var(--accent)}
.pav.av-selected-old{display:none}
@keyframes av-pulse{0%,100%{box-shadow:0 0 0 3px rgba(34,211,238,.35)}50%{box-shadow:0 0 0 5px rgba(34,211,238,.18)}}
.pav img{width:100%;height:100%;object-fit:cover}
.pav .avh{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:10px;color:#fff;pointer-events:none;gap:2px;line-height:1.3}
.pav:hover .avh{opacity:1}
.pav.av-selected .avh{opacity:1;background:rgba(0,180,220,.25)}
.pav .av-zoom{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:5px;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:3;transition:background .15s;line-height:1}
.pav:hover .av-zoom{display:flex}
.pav .av-zoom:hover{background:rgba(99,102,241,.8)}

.lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;gap:16px}
.lightbox.show{display:flex}
.lightbox-img{max-width:85vw;max-height:72vh;border-radius:14px;box-shadow:0 12px 60px rgba(0,0,0,.6);object-fit:contain;transition:transform .2s;cursor:zoom-in}
.lightbox-img.zoomed{transform:scale(2);cursor:zoom-out}
.lightbox-name{font-size:16px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.lightbox-sub{font-size:11px;color:rgba(255,255,255,.5)}
.lightbox-close{position:absolute;top:18px;right:24px;width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lightbox-close:hover{background:rgba(255,255,255,.25)}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.lightbox-nav:hover{background:rgba(255,255,255,.22)}
.lightbox-nav.prev{left:20px}
.lightbox-nav.next{right:20px}
.lightbox-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.4)}
.pnm-old-replaced{display:none}
.ptags-old{display:none}
.ptag{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600}
.t-legend{background:rgba(234,179,8,.2);color:#eab308}.t-epic{background:rgba(168,85,247,.2);color:#a855f7}
.t-rare{background:rgba(59,130,246,.2);color:#3b82f6}.t-ling{background:rgba(236,72,153,.2);color:#ec4899}
.t-type{background:rgba(99,102,241,.15);color:#818cf8}
.pprog-old{display:none}
.pacts-old-replaced{display:none}
.pa{background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);padding:1px;border-radius:3px;transition:all .15s}
.pa:hover{color:var(--accent2);background:rgba(99,102,241,.1)}
.pa.del:hover{color:var(--fail);background:rgba(239,68,68,.1)}


.t-gold{background:rgba(245,158,11,.15);color:var(--gold)}
.t-purple{background:rgba(168,85,247,.18);color:#a855f7}
.t-blue{background:rgba(59,130,246,.18);color:#3b82f6}
.pet-meta{display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap}
.pet-rarity-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pet-rarity-dot.t-gold{background:var(--gold)}.pet-rarity-dot.t-purple{background:#a855f7}.pet-rarity-dot.t-blue{background:#3b82f6}
.pet-rarity-txt{font-size:10px;font-weight:600;color:var(--muted)}
.pet-src{font-size:9px;color:var(--muted);opacity:.7}
.pet-prog-row{display:flex;align-items:center;gap:3px;justify-content:center}
.pet-pct{font-size:12px;font-weight:800}
.pet-fc{font-size:10px;color:var(--fail);font-weight:700}
.pet-minibar{width:80%;height:3px;border-radius:2px;background:var(--border);overflow:hidden;margin:0 auto}
.pav{width:72px;height:72px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden;cursor:pointer;position:relative;border:2px solid transparent;transition:border-color .2s}
.pnm{font-size:11px;font-weight:700;max-width:110px;text-align:center;word-break:break-all;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pacts{display:none;gap:2px;margin-top:2px}
.pcol:hover .pacts{display:flex}
.cell{min-height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:600;padding:4px;transition:background .1s;user-select:none;min-width:115px;position:relative}
.cell:hover{background:rgba(255,255,255,.06)}
.cell.s-pass{color:var(--pass)}.cell.s-fail{color:var(--fail);background:rgba(255,60,60,.08)}
.cell.s-pending{color:var(--pending)}.cell.s-na{color:var(--skip)}
.cell .cell-note{position:absolute;top:1px;right:2px;font-size:8px;color:var(--pending);cursor:pointer;opacity:.6}
.cell .cell-note:hover{opacity:1}
.cell.has-note::after{content:'';position:absolute;top:2px;right:2px;width:0;height:0;border-left:5px solid transparent;border-top:5px solid var(--pending)}

.cell .bug-link{position:absolute;bottom:1px;right:2px;font-size:10px;text-decoration:none;color:var(--fail);opacity:.7;cursor:pointer;z-index:2}
.cell .bug-link:hover{opacity:1;text-decoration:underline}
.cell.s-fail .bug-hint{position:absolute;bottom:1px;left:2px;font-size:8px;color:var(--muted);opacity:.4;pointer-events:none}

.pav.av-selected{border-color:#3B82F6!important;transform:scale(1.08);box-shadow:0 0 0 2px #3B82F6,0 8px 24px rgba(0,0,0,.3);z-index:2;transition:all .2s}
.pav .avh-sel{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:9px;color:#a5f3fc;opacity:0;transition:opacity .15s;pointer-events:none}
.pav.av-selected .avh-sel{opacity:1}

.ctx-menu{position:fixed;z-index:250;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 0;min-width:160px;box-shadow:0 8px 30px rgba(0,0,0,.4);font-size:12px}
.ctx-menu .ctx-item{padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text);transition:background .1s}
.ctx-menu .ctx-item:hover{background:rgba(99,102,241,.12)}
.ctx-menu .ctx-sep{height:1px;background:var(--border);margin:3px 0}

.ra{display:flex;gap:2px;opacity:0;transition:opacity .12s;position:absolute;right:4px;top:50%;transform:translateY(-50%)}
.rh:hover .ra{opacity:1}
.rab{width:18px;height:18px;border:none;border-radius:3px;background:transparent;color:var(--muted);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .12s;padding:0}
.rab:hover{background:rgba(99,102,241,.15);color:var(--accent2)}
.rab.del:hover{background:rgba(239,68,68,.12);color:var(--fail)}

.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty .big{font-size:60px;margin-bottom:12px}

.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:90%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 50px rgba(0,0,0,.4)}
.modal h2{font-size:16px;margin-bottom:14px}
.fg{margin-bottom:12px}.fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:inherit}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent)}
.fg select{cursor:pointer}.fg select option{background:var(--card);color:var(--text)}
.factions{display:flex;gap:6px;justify-content:flex-end;margin-top:16px}

.ptable{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
.ptable th{color:var(--accent2);padding:4px;text-align:left;border-bottom:1px solid var(--border)}
.ptable td{padding:4px;border-bottom:1px solid rgba(255,255,255,.04)}

.season-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.season-pill{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.season-pill:hover{border-color:var(--accent);color:var(--text)}.season-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.toast{position:fixed;bottom:24px;right:24px;padding:8px 18px;background:var(--pass);color:#fff;border-radius:7px;font-size:12px;font-weight:600;transform:translateY(80px);opacity:0;transition:all .3s;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:768px){.header{padding:10px}.table-wrap{padding:6px 10px}}


.rh-main{font-size:13px;font-weight:600;color:var(--accent2);display:block;line-height:1.4}
.rh-sub{font-size:11px;font-weight:400;color:var(--muted);display:block;line-height:1.3;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:help;opacity:.7}
.rh-sub:hover{opacity:1;white-space:normal;overflow:visible}
.cell-note-img{position:absolute;top:1px;left:2px;font-size:9px;opacity:.7;pointer-events:none}
.cell-stamp{position:absolute;bottom:1px;right:2px;font-size:8px;color:var(--muted);font-weight:600;opacity:.7;line-height:1;letter-spacing:-.3px}
.note-drop{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;color:var(--muted);cursor:pointer;transition:all .2s;font-size:13px;margin-top:8px}
.note-drop:hover,.note-drop.drag{border-color:var(--accent);color:var(--text)}
.note-drop img{max-width:100%;max-height:130px;border-radius:6px;object-fit:contain}
.pet-src-row{width:100%;padding:2px 4px;display:flex;flex-direction:column;gap:2px}
.pet-src-row .src-sel{width:100%;background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:10px;padding:2px 4px;cursor:pointer;outline:none;text-align:center}
.pet-src-row .src-sel:hover{border-color:var(--accent)}
.pet-src-row .src-custom{width:100%;background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:10px;padding:2px 4px;outline:none}

table.mt tbody tr:nth-child(even) td{background:rgba(255,255,255,.02)}
table.mt tbody tr:nth-child(odd) td{background:rgba(255,255,255,.0)}
table.mt tbody tr:hover td{background:rgba(255,255,255,.05)!important}
table.mt tbody tr:hover td .cell{background:transparent!important}

table.mt tbody tr[data-gid] td.rh{border-left:3px solid var(--cat-c,var(--border))}
</style>
</head>
<body>

<div class="header">
  <h1>🐾 宠物外观版本测试跟踪器</h1>
  <div class="header-right" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
    <button class="btn btn-outline btn-sm" onclick="exportAll()">📥 导出</button>
    <button class="btn btn-outline btn-sm" onclick="importAll()">📤 导入</button>
    <button class="btn btn-purple btn-sm" onclick="showLoadModal()">🔄 载入版本宠物</button>
    <button class="btn btn-primary btn-sm" onclick="showAddPetModal()">＋ 新增宠物</button>
  </div>
</div>

<div class="vtabs" id="vtabs"></div>
<div class="data-status" id="dataStatus"></div>
<div class="stats-bar" id="statsBar"></div>
<div class="table-wrap" id="tableWrap"></div>

<!-- Load Modal -->
<div class="modal-bg" id="loadModal">
<div class="modal" style="max-width:620px">
  <h2>🔄 从策划表载入版本宠物外观</h2>
  <p style="font-size:11px;color:var(--muted);margin-bottom:10px">查询 AnimalPet_AppearanceFactor 表, 筛选开放赛季 + ClassName=body</p>
  <div class="fg">
    <label>赛季版本号 *</label>
    <input id="loadSeasonInput" placeholder="例: 333 或 3.3.3">
    <div id="seasonPills" class="season-pills"></div>
  </div>
  <div class="fg"><label>载入方式</label><select id="loadMode"><option value="current">载入到当前版本</option><option value="new">创建新版本并载入</option></select></div>
  <div id="loadPreview" style="display:none">
    <div id="loadPreviewContent" style="max-height:220px;overflow-y:auto;background:rgba(0,0,0,.15);border-radius:6px;padding:8px"></div>
  </div>
  <div class="factions">
    <button class="btn btn-outline btn-sm" onclick="closeModal('loadModal')">取消</button>
    <button class="btn btn-purple btn-sm" onclick="doLoadQuery()" id="loadQueryBtn">🔍 查询</button>
    <button class="btn btn-primary btn-sm" onclick="doLoadConfirm()" id="loadConfirmBtn" style="display:none">✅ 确认载入</button>
  </div>
</div>
</div>

<!-- Add Pet Modal -->
<div class="modal-bg" id="addPetModal">
<div class="modal">
  <h2>✨ 新增宠物外观</h2>
  <div class="fg"><label>名称 *</label><input id="f_name" placeholder="例: 冰蓝水灵"></div>
  <div class="fg"><label>模板ID</label><input id="f_tid" placeholder="例: 36600004"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div class="fg"><label>稀有度</label><select id="f_rarity"><option>典藏珍</option><option>典藏</option><option>稀有</option><option>灵宠</option></select></div>
    <div class="fg"><label>类型</label><select id="f_type"><option>普通</option><option>灵宠</option><option>联动</option><option>耳洞偏色</option></select></div>
  </div>

      <img id="notePreview" style="display:none">

<script>
const API='';
const CAT_COLORS={'策划配置':'#6366f1','美术资源':'#a855f7','界面功能':'#eab308','投放验证':'#f97316','特殊专项':'#ec4899'};
const DEFAULT_GROUPS=[
  // 一、策划配置 (7)
  {id:'cfg_factor',cat:'策划配置',title:'外观因子表（因子ID、名称、稀有等级、类型、资源路径、分块名、头像）',color:'#818cf8'},
  {id:'cfg_pet',cat:'策划配置',title:'Pet模板表（模板ID、名称、种类、获得方式、流程图、怪物ID、外观ID）',color:'#818cf8'},
  {id:'cfg_item',cat:'策划配置',title:'Item道具表（编号、名称、说明、类型、使用后action）',color:'#818cf8'},
  {id:'cfg_season',cat:'策划配置',title:'外放状态与开放赛季（不外放=3，当前版本正常）',color:'#818cf8'},
  {id:'cfg_score',cat:'策划配置',title:'衣品值配置（灵宠4000/典藏珍400/典藏120）',color:'#818cf8'},
  {id:'cfg_intimacy',cat:'策划配置',title:'亲密度配置（等级、称呼、描述、触发action）',color:'#818cf8'},
  {id:'cfg_setting',cat:'策划配置',title:'Setting配置（名字、数值、表值）',color:'#818cf8'},
  // 二、美术资源 (6)
  {id:'art_model',cat:'美术资源',title:'模型检查（原画一致、无穿插、体型适配、舆论风险）',color:'#c084fc'},
  {id:'art_vfx',cat:'美术资源',title:'特效检查（拖尾、粒子、叠加效果）',color:'#c084fc'},
  {id:'art_action',cat:'美术资源',title:'动作检查（预期效果、体型适配、时机连贯）',color:'#c084fc'},
  {id:'art_world',cat:'美术资源',title:'大世界表现（模型/闪光/异色/第三人称）',color:'#c084fc'},
  {id:'art_page',cat:'美术资源',title:'主页场景（个人主页+宠物主页，无过曝过暗）',color:'#c084fc'},
  {id:'art_env',cat:'美术资源',title:'天气与画质（雨雪反射影子 × 三档画质）',color:'#c084fc'},
  // 三、界面功能 (8)
  {id:'ui_icon',cat:'界面功能',title:'图标显示（未获得灰色、已获得正确图标+动效）',color:'#fbbf24'},
  {id:'ui_info',cat:'界面功能',title:'数据面板与图鉴（数据显示、图鉴信息、萌爪商店）',color:'#fbbf24'},
  {id:'ui_summon',cat:'界面功能',title:'召唤状态标识（右下角标记）',color:'#fbbf24'},
  {id:'ui_page',cat:'界面功能',title:'分享功能与详情跳转',color:'#fbbf24'},
  {id:'ui_values',cat:'界面功能',title:'亲密度与元气值（显示、描述、消耗）',color:'#fbbf24'},
  {id:'ui_trait',cat:'界面功能',title:'特质图标与描述',color:'#fbbf24'},
  {id:'ui_rename',cat:'界面功能',title:'认名功能（语音、动作、互动表情）',color:'#fbbf24'},
  {id:'ui_gender',cat:'界面功能',title:'性别显示（与图鉴一致，联动IP与原作一致）',color:'#fbbf24'},
  // 四、投放验证 (5)
  {id:'drop_factor',cat:'投放验证',title:'投放外观因子验证（与预期符合、无错漏）',color:'#fb923c'},
  {id:'drop_way',cat:'投放验证',title:'获得方式验证（商店/副本/捕捉等）',color:'#fb923c'},
  {id:'drop_trait',cat:'投放验证',title:'投放特质验证（与预期符合、同档一致）',color:'#fb923c'},
  {id:'drop_item',cat:'投放验证',title:'Item使用获得宠物',color:'#fb923c'},
  {id:'drop_appear',cat:'投放验证',title:'投放头像与性别（头像与模型一致、性别正确）',color:'#fb923c'},
  // 五、特殊专项 (8)
  {id:'sp_mvp',cat:'特殊专项',title:'灵宠：MVP动画+表情动作',color:'#f472b6'},
  {id:'sp_ring',cat:'特殊专项',title:'灵宠：背环效果',color:'#f472b6'},
  {id:'sp_dynamic',cat:'特殊专项',title:'灵宠：动特效果',color:'#f472b6'},
  {id:'sp_motion',cat:'特殊专项',title:'灵宠：休闲与飞行动作',color:'#f472b6'},
  {id:'sp_backpack',cat:'特殊专项',title:'灵宠：背包格子显示',color:'#f472b6'},
  {id:'sp_highlight',cat:'特殊专项',title:'灵宠：卖点动作',color:'#f472b6'},
  {id:'sp_fubao',cat:'特殊专项',title:'福宝宝：额外休闲待机动作',color:'#f472b6'},
  {id:'sp_dye',cat:'特殊专项',title:'萌萌泥：染色功能',color:'#f472b6'},
];

const RANK_MAP={1:'普通',2:'精良',3:'稀有',4:'典藏',5:'典藏珍',6:'灵宠',7:'典藏·极'};
const TYPE_MAP={1:'猫',2:'狗',3:'企鹅',4:'兔子',5:'鹿',6:'狐狸',7:'凤凰',8:'鹰',9:'逆崽',10:'八爪鱼',11:'hentai',12:'灵宠',13:'萌萌泥',14:'福宝宝',15:'绒绒',16:'皮皮鼠',17:'小松鼠'};
const EMOJI_MAP={'灵宠':'🐲','联动':'🌟','异世':'🔮','繁育偏色':'🎨','普通':'🐾'};
function r2rarity(r){return r>=6?'灵宠':r===5?'典藏珍':r===4?'典藏':'稀有'}
function r2petType(pt){return pt===12?'灵宠':pt===11?'异世':'普通'}
function normSeason(s){s=s.trim();if(/^\d{3,}$/.test(s)&&!s.includes('.'))return s.split('').join('.');return s}

let app={versions:[],currentVersion:null}, loadCache=[];
function curVer(){return app.versions.find(v=>v.id===app.currentVersion)}
function getGroups(){const v=curVer();return(v&&v.checkGroups&&v.checkGroups.length)?v.checkGroups:DEFAULT_GROUPS}
function ensureGroups(){const v=curVer();if(v&&(!v.checkGroups||!v.checkGroups.length))v.checkGroups=JSON.parse(JSON.stringify(DEFAULT_GROUPS))}

async function loadFromServer(){
  try{const r=await fetch(API+'/api/tracker');const d=await r.json();if(d.success&&d.data&&d.data.versions)app=d.data}catch(e){
    const s=localStorage.getItem('pet_tracker_v3');if(s)app=JSON.parse(s);
  }
  if(!app.versions.length)app.versions=[{id:'v1',name:'默认版本',pets:[],checkGroups:JSON.parse(JSON.stringify(DEFAULT_GROUPS))}];
  if(!app.currentVersion)app.currentVersion=app.versions[0].id;
}
async function saveToServer(){
  localStorage.setItem('pet_tracker_v3',JSON.stringify(app));
  try{await fetch(API+'/api/tracker',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(app)})}catch(e){}
}
async function loadDataStatus(){
  try{const r=await fetch(API+'/api/all_seasons');const d=await r.json();
    if(d.success)document.getElementById('dataStatus').innerHTML=`<span class="data-dot"></span> 策划表: ${d.total_pets}条, ${d.seasons.length}赛季`
  }catch(e){document.getElementById('dataStatus').innerHTML=`<span class="data-dot empty"></span> 后端未连接`}
}

function render(){renderTabs();renderStats();renderTable();saveToServer()}

function renderTabs(){
  let h='';app.versions.forEach((v,vi)=>{
    h+=`<div class="vtab${v.id===app.currentVersion?' active':''}" onclick="switchVer('${v.id}')">${v.name}<span style="opacity:.5;font-size:10px;margin-left:4px">(${v.pets.length})</span><span class="vtab-edit" onclick="event.stopPropagation();editVerName(${vi})">✏️</span><span class="vtab-edit" style="color:var(--fail)" onclick="event.stopPropagation();delVersion(${vi})" title="删除此赛季">✕</span></div>`;
  });
  h+=`<button class="vtab-add" onclick="showModal('addVerModal')">＋</button>`;
  document.getElementById('vtabs').innerHTML=h;
}
function editVerName(vi){
  const v=app.versions[vi];const n=prompt('编辑版本名称:',v.name);
  if(!n||!n.trim())return;v.name=n.trim();render();toast('版本名已更新');
}
function delVersion(vi){
  const v=app.versions[vi];
  if(!confirm('确定删除赛季「'+v.name+'」？\n包含 '+v.pets.length+' 个宠物和所有测试数据，删除后不可恢复！'))return;
  app.versions.splice(vi,1);
  if(app.currentVersion===v.id){
    app.currentVersion=app.versions.length?app.versions[Math.min(vi,app.versions.length-1)].id:null;
  }
  if(!app.versions.length){
    app.versions=[{id:'v1',name:'默认版本',pets:[],checkGroups:JSON.parse(JSON.stringify(DEFAULT_GROUPS))}];
    app.currentVersion='v1';
  }
  render();toast('已删除赛季「'+v.name+'」','var(--fail)');
}

function renderStats(){
  const v=curVer();if(!v)return;
  const gs=getGroups();let total=0,pass=0,fail=0;
  v.pets.forEach(p=>{gs.forEach(g=>{const s=(p.checks&&p.checks[g.id])||'';if(s==='na')return;total++;if(s==='pass')pass++;else if(s==='fail')fail++})});
  const pend=total-pass-fail,pct=total?Math.round(pass/total*100):0;
  const ppW=total?(pass/total*100).toFixed(1):0, pfW=total?(fail/total*100).toFixed(1):0, pwW=total?(pend/total*100).toFixed(1):0;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-cards">
      <div class="stat-card"><span class="stat-icon">🐾</span><span class="stat-num">${v.pets.length}</span><span class="stat-label">宠物</span></div>
      <div class="stat-card sc-pass"><span class="stat-icon">✅</span><span class="stat-num">${pass}</span><span class="stat-label">通过</span></div>
      <div class="stat-card sc-fail"><span class="stat-icon">❌</span><span class="stat-num">${fail}</span><span class="stat-label">失败</span></div>
      <div class="stat-card sc-pend"><span class="stat-icon">⏳</span><span class="stat-num">${pend}</span><span class="stat-label">待测</span></div>
    </div>
    <div class="stat-progress-wrap">
      <div class="stat-pct">${pct}%</div>
      <div class="stat-progress">
        <div class="sp-pass" style="width:${ppW}%"></div><div class="sp-fail" style="width:${pfW}%"></div><div class="sp-pend" style="width:${pwW}%"></div>
      </div>
      <div class="stat-legend"><span class="sl-item"><span class="sl-dot" style="background:var(--pass)"></span>通过</span><span class="sl-item"><span class="sl-dot" style="background:var(--fail)"></span>失败</span><span class="sl-item"><span class="sl-dot" style="background:var(--muted)"></span>待测</span></div>
    </div>
    <div class="filter-chips">
      <span class="filter-chip active" data-filter="all" onclick="setFilter('all')">全部</span>
      <span class="filter-chip" data-filter="fail" onclick="setFilter('fail')">仅失败</span>
      <span class="filter-chip" data-filter="pending" onclick="setFilter('pending')">仅待测</span>
    </div>
    <button class="btn btn-outline btn-sm" onclick="addGroupRow()" style="margin-left:auto">＋ 新增检查行</button>`;
}

function renderTable(){
  const v=curVer();
  if(!v){document.getElementById('tableWrap').innerHTML='<div class="empty"><div class="big">📦</div>请先创建版本</div>';return}
  if(!v.pets.length){document.getElementById('tableWrap').innerHTML='<div class="empty"><div class="big">🐣</div><div style="font-size:15px;margin-bottom:8px">暂无宠物</div><div style="font-size:12px">点击「载入版本宠物」或「新增宠物」开始</div></div>';return}
  const gs=getGroups(), pets=v.pets;
  const SRC_OPTS=['商店','捕捉','繁育','联动活动','自定义'];
  let h='<table class="mt"><thead><tr>';
  h+='<th class="corner rh" style="text-align:center;font-size:11px;color:var(--muted)">检查项 \\ 宠物</th>';
  // Pet columns
  pets.forEach((p,pi)=>{
    const rc={'灵宠':'t-gold','典藏珍':'t-gold','典藏':'t-purple','稀有':'t-blue'}[p.rarity]||'t-blue';
    const prog=getProg(p,gs),fc=getFails(p,gs),ap=prog===100&&fc===0;
    const av=p.avatar?`<img src="${p.avatar}">`:(EMOJI_MAP[p.petType]||'🐾');
    const zoomBtn=p.avatar?`<button class="av-zoom" onclick="event.stopPropagation();openLightbox(${pi})" title="放大查看">🔍</button>`:'';
    // Micro progress bar colors
    const progCol=fc?'var(--fail)':ap?'var(--pass)':'var(--pending)';
    const srcTxt=p.source||'';
    h+=`<th class="ch"><div class="pcol">
      <div class="pav${avIdx===pi?' av-selected':''}" id="av-${pi}" onclick="selectAv(event,${pi})" ondblclick="dblClickAv(${pi})" tabindex="0">${av}${zoomBtn}<div class="avh">📷 单击选中 · Ctrl+V粘贴 · 双击选文件</div></div>
      <div class="pnm" title="${p.name}">${p.name}</div>
      <div class="pet-meta"><span class="pet-rarity-dot ${rc}"></span><span class="pet-rarity-txt">${p.rarity}</span>${srcTxt?'<span class="pet-src">'+srcTxt+'</span>':''}</div>
      <div class="pet-prog-row"><span class="pet-pct" style="color:${progCol}">${prog}%</span>${fc?'<span class="pet-fc">✗'+fc+'</span>':''}</div>
      <div class="pet-minibar"><div style="width:${prog}%;background:${progCol};height:100%;border-radius:2px;transition:width .3s"></div></div>
      <div class="pet-src-row">
        <select class="src-sel" onchange="saveSrcSel(${pi},this)" title="获取方式">${(()=>{const cur2=p.source||'';const isCust=cur2&&!SRC_OPTS.includes(cur2);let o=SRC_OPTS.map(s=>`<option value="${s}"${cur2===s?' selected':''}>${s}</option>`).join('');o=`<option value=""${!cur2?' selected':''}>—</option>`+o;if(isCust)o+=`<option value="${cur2}" selected>${cur2}</option>`;return o})()}</select>
        <input class="src-custom" placeholder="自定义…" value="${(()=>{const cur2=p.source||'';const isCust=cur2&&!SRC_OPTS.includes(cur2);return(isCust?cur2:'')})()}" onblur="saveSrcCustom(${pi},this)" style="display:${(p.source&&!SRC_OPTS.includes(p.source)||p.source==='自定义')?'block':'none'}">
      </div>
      <div class="pacts">
        <button class="pa" title="全Pass" onclick="batchAll(${pi},'pass')">✅</button>
        <button class="pa" title="全N/A" onclick="batchAll(${pi},'na')">⊘</button>
        <button class="pa" title="重置" onclick="resetPet(${pi})">🔄</button>
        <button class="pa del" title="删除" onclick="delPet(${pi})">🗑</button>
      </div>
    </div></th>`;
  });
  h+='</tr></thead><tbody>';
  // Check rows — with category header rows
  let lastCat='';
  const catIcons={'策划配置':'📋','美术资源':'🎨','界面功能':'🖥️','投放验证':'📦','特殊专项':'⭐'};
  gs.forEach((g,gi)=>{
    const thisCat=g.cat||'';
    if(thisCat&&thisCat!==lastCat){
      const cc=CAT_COLORS[thisCat]||'#6366f1';
      const ci=catIcons[thisCat]||'📌';
      // Count items in this category
      let span=0;for(let j=gi;j<gs.length;j++){if((gs[j].cat||'')===thisCat)span++;else break}
      // Count fails in this category
      let catFails=0;
      for(let j=gi;j<gs.length;j++){
        if((gs[j].cat||'')!==thisCat)break;
        pets.forEach(p=>{if((p.checks&&p.checks[gs[j].id])==='fail')catFails++});
      }
      const failBadge=catFails?`<span style="float:right;font-size:11px;font-weight:700;color:var(--fail)">${catFails} fail</span>`:`<span style="float:right;font-size:11px;font-weight:400;color:var(--muted)">0 fail</span>`;
      h+=`<tr class="cat-row"><td colspan="${pets.length+1}" style="border-left:4px solid ${cc};box-shadow:inset 4px 0 0 ${cc}"><span class="cat-label" style="color:${cc};background:${cc}15">${ci} <span contenteditable="true" spellcheck="false" onblur="renameCat('${thisCat}',this.textContent)" style="outline:none;cursor:text">${thisCat}</span></span> <span style="font-size:10px;color:var(--muted);font-weight:400">(${span}项)</span>${failBadge}</td></tr>`;
      lastCat=thisCat;
    }
    // Split title: main part vs parenthesized detail
    const titleRaw=g.title;
    const pIdx=titleRaw.indexOf('（');
    const pIdx2=pIdx===-1?titleRaw.indexOf('('):pIdx;
    let mainTitle=titleRaw,subDetail='';
    if(pIdx2>0){mainTitle=titleRaw.substring(0,pIdx2).trim();subDetail=titleRaw.substring(pIdx2);}
    const subHtml=subDetail?`<span class="rh-sub" title="${subDetail.replace(/"/g,'&quot;')}">${subDetail}</span>`:'';
    h+=`<tr data-gid="${g.id}" style="--cat-c:${g.color}"><td class="rh gh" style="border-left:3px solid ${g.color};position:relative"><span class="rh-main">${mainTitle}</span>${subHtml}
      <span class="ra"><button class="rab" title="编辑" onclick="editGrp(${gi})">✏️</button><button class="rab del" title="删除" onclick="delGrp(${gi})">✕</button></span>
    </td>`;
    pets.forEach((p,pi)=>{
      const s=(p.checks&&p.checks[g.id])||'';
      const cls=s==='pass'?'s-pass':s==='fail'?'s-fail':s==='pending'?'s-pending':s==='na'?'s-na':'';
      const txt=s==='pass'?'pass':s==='fail'?'✗ fail':s==='pending'?'待测':s==='na'?'N/A':'—';
      const noteKey=g.id+'__'+pi;
      const hasNote=p.notes&&p.notes[noteKey];
      const bugKey='bug__'+g.id+'__'+pi;
      const hasBug=p.bugs&&p.bugs[bugKey];
      let cellInner=txt;
      const bugUrl=hasBug?bugTextToUrl(hasBug):'';

const BUG_BASE='https://l36.pm.netease.com/v6/issues/';
function bugTextToUrl(text){
  text=(text||'').trim();
  if(!text)return '';
  // Already a full URL
  if(/^https?:\/\//i.test(text))return text;
  // Extract #number pattern
  const m=text.match(/#(\d+)/);
  if(m)return BUG_BASE+m[1];
  // Pure number
  if(/^\d+$/.test(text))return BUG_BASE+text;
  return '';
}

// === 检查项跨版本同步 ===
function syncGroupToOtherVersions(item, insertIdx, action){
  const curId=app.currentVersion;
  let synced=0;
  app.versions.forEach(v=>{
    if(v.id===curId)return; // 跳过当前版本（已经处理了）
    if(!v.checkGroups||!v.checkGroups.length)v.checkGroups=JSON.parse(JSON.stringify(DEFAULT_GROUPS));
    
    if(action==='add'){
      // 检查是否已有同ID的检查项
      if(v.checkGroups.some(g=>g.id===item.id))return;
      // 在同分类末尾插入
      let idx=v.checkGroups.length;
      for(let i=v.checkGroups.length-1;i>=0;i--){
        if(v.checkGroups[i].cat===item.cat){idx=i+1;break}
      }
      v.checkGroups.splice(idx,0,JSON.parse(JSON.stringify(item)));
      synced++;
    }
    else if(action==='delete'){
      const idx=v.checkGroups.findIndex(g=>g.id===item.id);
      if(idx>=0){
        const gid=v.checkGroups[idx].id;
        v.checkGroups.splice(idx,1);
        // 同时清理宠物的 checks
        (v.pets||[]).forEach(p=>{if(p.checks)delete p.checks[gid]});
        synced++;
      }
    }
    else if(action==='rename'){
      const g=v.checkGroups.find(g=>g.id===item.id);
      if(g){g.title=item.title;synced++}
    }
  });
  if(synced)console.log(`[sync] ${action} "${item.title||item.id}" → 同步 ${synced} 个版本`);
}

    });

    toast(msg);

    if(!d.success||!d.pets.length){toast('无数据','var(--pending)');document.getElementById('loadPreview').style.display='none';return}
    loadCache=d.pets;
    let h=`<div style="font-size:11px;color:var(--pass);margin-bottom:4px">✅ ${d.total} 个宠物</div>`;

    d.pets.forEach((p,i)=>{
      const rn=RANK_MAP[p.rank]||'R'+p.rank,c=p.rank>=6?'#ec4899':p.rank>=5?'#eab308':p.rank>=4?'#a855f7':'#3b82f6';
      h+=`<tr><td>${Math.round(p.id)}</td><td style="font-weight:600">${p.name}</td><td><span style="padding:1px 4px;border-radius:3px;font-size:9px;background:${c}22;color:${c}">${rn}</span></td><td>${TYPE_MAP[p.petType]||'T'+p.petType}</td><td><input type="checkbox" checked data-i="${i}"></td></tr>`;
    });h+='</table>';
    document.getElementById('loadPreviewContent').innerHTML=h;
    document.getElementById('loadPreview').style.display='block';
    document.getElementById('loadConfirmBtn').style.display='';
  }catch(e){toast('请求失败','var(--fail)')}
  finally{document.getElementById('loadQueryBtn').textContent='🔍 查询';document.getElementById('loadQueryBtn').disabled=false}
}
function doLoadConfirm(){
  if(!loadCache.length)return;
  const sel=[];document.querySelectorAll('#loadPreviewContent input[type=checkbox]').forEach(c=>{if(c.checked)sel.push(+c.dataset.i)});
  if(!sel.length)return toast('请选择','var(--fail)');
  let tv;
  if(document.getElementById('loadMode').value==='new'){
    const s=normSeason(document.getElementById('loadSeasonInput').value);
    const id='v'+Date.now();const srcGroups=curVer()&&curVer().checkGroups&&curVer().checkGroups.length?curVer().checkGroups:DEFAULT_GROUPS;app.versions.push({id,name:'S'+s+'赛季',pets:[],checkGroups:JSON.parse(JSON.stringify(srcGroups))});app.currentVersion=id;tv=app.versions.find(v=>v.id===id);
  }else tv=curVer();
  const exist=new Set(tv.pets.map(p=>p.name));let added=0,skip=0;
  sel.forEach(i=>{
    const r=loadCache[i];if(exist.has(r.name)){skip++;return}exist.add(r.name);
    tv.pets.push({name:r.name,templateId:String(Math.round(r.id)),rarity:r2rarity(r.rank),petType:r2petType(r.petType),source:'',avatar:'',checks:{}});added++;
  });
  closeModal('loadModal');render();toast('载入 '+added+' 个'+(skip?' (跳过'+skip+'重复)':''));
}

function exportAll(){const b=new Blob([JSON.stringify(app,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='pet_tracker_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);toast('已导出')}
function importAll(){document.getElementById('fileIn').click()}
function handleImport(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.versions){app=d;render();toast('导入成功')}else toast('格式错误','var(--fail)')}catch(err){toast('失败','var(--fail)')}};r.readAsText(f);e.target.value=''}
function toast(msg,bg){const e=document.getElementById('toast');e.textContent=msg;e.style.background=bg||'var(--pass)';e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}

// table-wrap 独立滚动容器：高度 = viewport - 上方所有元素高度
function setTableWrapH(){
  const tw=document.getElementById('tableWrap');
  if(!tw)return;
  const rect=tw.getBoundingClientRect();
  tw.style.height=(window.innerHeight - rect.top)+'px';
}
document.addEventListener('DOMContentLoaded',setTableWrapH);
window.addEventListener('resize',setTableWrapH);
// 每次 render 后也需要重算（vtabs/statsBar 可能撑高）
const _origRender=render;
render=function(){_origRender();setTimeout(setTableWrapH,50)};

(async()=>{await loadFromServer();render();loadDataStatus()})();


// === 操作人管理 ===
let currentUser = localStorage.getItem('pet_tracker_user') || '';
function promptUser(){if(!currentUser)showModal('setUserModal');}
function setUser(){
  const v=document.getElementById('f_username').value.trim();
  if(!v)return toast('请输入名字','var(--fail)');
  currentUser=v;localStorage.setItem('pet_tracker_user',v);
  closeModal('setUserModal');
  renderUserBar();toast('已设置: '+v);
}
function renderUserBar(){
  const bar=document.getElementById('userBar');
  if(!bar)return;
  if(currentUser){
    bar.innerHTML='<span style="font-size:12px;color:var(--muted)">👤 '+currentUser+' <a href="#" onclick="currentUser=\'\';localStorage.removeItem(\'pet_tracker_user\');renderUserBar();return false" style="color:var(--accent);font-size:11px;margin-left:6px">切换</a></span>';
  } else {
    bar.innerHTML='<a href="#" onclick="showModal(\'setUserModal\');return false" style="font-size:12px;color:var(--accent)">👤 设置操作人</a>';
  }
}
setTimeout(()=>{renderUserBar();promptUser();},500);

// === 备注(含图片)功能 ===
let noteEditState = null;
function openNote(pi,gid){
  const p=curVer().pets[pi];if(!p)return;
  const nk='note__'+gid+'__'+pi;
  const old=p.notes&&p.notes[nk]||{};
  noteEditState={pi,gid,key:nk};
  document.getElementById('noteText').value=old.text||'';
  const prev=document.getElementById('notePreview');
  const lbl=document.getElementById('noteDropLabel');
  if(old.img){prev.src=old.img;prev.style.display='block';lbl.textContent='点击更换图片';}
  else{prev.src='';prev.style.display='none';lbl.textContent='点击或拖拽上传图片';}
  showModal('noteModal');
}
function handleNoteFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=function(e){
    document.getElementById('notePreview').src=e.target.result;
    document.getElementById('notePreview').style.display='block';
    document.getElementById('noteDropLabel').textContent='点击更换图片';
  };reader.readAsDataURL(file);
}
function saveNote(){
  if(!noteEditState)return;
  const{pi,gid,key}=noteEditState;
  const p=curVer().pets[pi];if(!p)return;
  if(!p.notes)p.notes={};
  const txt=document.getElementById('noteText').value.trim();
  const img=document.getElementById('notePreview').src||'';
  if(txt||img)p.notes[key]={text:txt,img:img.startsWith('data:')?img:''};
  else delete p.notes[key];
  closeModal('noteModal');noteEditState=null;
  saveToServer();render();toast('备注已保存');
}



// Column hover highlight
function initColHighlight(){
  const tbl=document.querySelector('table.mt');if(!tbl)return;
  tbl.addEventListener('mouseover',function(e){
    const td=e.target.closest('td,th');if(!td)return;
    const ci=td.cellIndex;if(ci<=0)return;
    tbl.querySelectorAll('.col-hl').forEach(el=>el.classList.remove('col-hl'));
    tbl.querySelectorAll('tr').forEach(tr=>{const c=tr.cells[ci];if(c)c.classList.add('col-hl')});
  });
  tbl.addEventListener('mouseleave',function(){
    tbl.querySelectorAll('.col-hl').forEach(el=>el.classList.remove('col-hl'));
  });
}

// Filter chips
let activeFilter='all';
function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.filter===f));
  applyFilter();
}
function applyFilter(){
  const tbl=document.querySelector('table.mt');if(!tbl)return;
  const gs=getGroups(),v=curVer();if(!v)return;
  tbl.querySelectorAll('tbody tr').forEach(tr=>{
    if(tr.classList.contains('cat-row')){tr.style.display='';return}
    const gid=tr.dataset.gid;if(!gid){tr.style.display='';return}
    if(activeFilter==='all'){tr.style.display='';return}
    let show=false;
    v.pets.forEach(p=>{
      const s=(p.checks&&p.checks[gid])||'';
      if(activeFilter==='fail'&&s==='fail')show=true;
      if(activeFilter==='pending'&&(s===''||s==='pending'))show=true;
    });
    tr.style.display=show?'':'none';
  });
}
</script>
